services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: todoflow-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Admin123A@"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
